var R=React,h=R.createElement,useState=R.useState,useEffect=R.useEffect,
    useRef=R.useRef,useCallback=R.useCallback,useMemo=R.useMemo,Fragment=R.Fragment;

var ICON_VALORES={"🟢":100,"🔵":100,"🟡":90,"🔴":40,"⚫":20,"⭕":null};
var ICON_LIST=["🟢","🔴","🟡","🔵","⚫","⭕"];
var ICON_LABELS={"🟢":"Asistencia (100%)","🔴":"Falta (40%)","🟡":"Retardo (90%)","🔵":"Lic. justif. (100%)","⚫":"Lic. injustif. (20%)","⭕":"Retirado (excluido)"};
var ICON_ES_RETIRADO=function(ic){return ic==="⭕";};
var ACT_COLORS=["#3266ad","#2d7a3a","#b07d00","#7b3fa0","#c0392b","#0e7c7b","#d4682a","#185fa5"];
var MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var WDAYS=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var DOC_TIPOS=["Plan de Modulo","Plan Anual","Plan de Desarrollo Curricular","POA","Proyecto Productivo"];
var TABS=["Inicio","Asistencia","Evaluacion","Resumen","Estadisticas","Informe","Planificacion","Tareas","Calendario","Filiacion","Centralizador"];
var ASIST_PUNTOS_DEFAULT=10;
var gradeColor=function(p){return p>=91?"#1a6e2e":p>=81?"#2d7a3a":p>=71?"#b07d00":p>=61?"#b05a00":"#c0392b";};
var gradeBg=function(p){return p>=91?"#d4f0dc":p>=81?"#eaf3de":p>=71?"#faeeda":p>=61?"#fde8d0":"#fcebeb";};
var gradeLabel=function(p){return p>=91?"Excelente":p>=81?"Muy Bueno":p>=71?"Bueno":p>=61?"Suficiente":"Requiere apoyo";};
var CARGO_MAESTRO=["Maestro/a Responsable","Docente","Tutor/a","Facilitador/a","Instructor/a","Profesor/a"];
var CARGO_DIRECTOR=["Director(a) del Centro Educativo","Director/a Academico/a","Director/a General","Director/a Administrativo/a","Rector/a","Coordinador/a Academico/a"];

var mkId=function(){return Math.random().toString(36).slice(2,8);};
var todayStr=function(){var d=new Date();return d.getDate()+"/"+(d.getMonth()+1)+"/"+String(d.getFullYear()).slice(2);};
var isoToFull=function(iso){if(!iso)return"";var p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];};
var pesoParsed=function(p){return parseFloat(String(p).replace(",","."))||1;};
var normMatch=function(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();};
var kv=function(k,v){var o={};o[k]=v;return o;};

var diaKeyToISO=function(d){
  var base=d.replace(/\(\d+\)$/,"");var p=base.split("/");
  if(p.length===3){var yy=parseInt(p[2]);var yyyy=yy<100?2000+yy:yy;return yyyy+"-"+String(parseInt(p[1])).padStart(2,"0")+"-"+String(parseInt(p[0])).padStart(2,"0");}
  return"";
};

var calcNotaAsist=function(sid,dias,asistencia){
  var diasActivos=dias.filter(function(d){var ic=asistencia[sid]?asistencia[sid][d]||"🟢":"🟢";return!ICON_ES_RETIRADO(ic);});
  if(!diasActivos.length)return 100;
  var vals=diasActivos.map(function(d){return ICON_VALORES[asistencia[sid]?asistencia[sid][d]||"🟢":"🟢"]||100;});
  return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
};

var esEstudianteRetirado=function(sid,dias,asistencia){
  if(!dias.length)return false;
  var retirados=dias.filter(function(d){return(asistencia[sid]?asistencia[sid][d]:"🟢")==="⭕";}).length;
  return retirados>dias.length/2;
};

var calcNotaFinalV2=function(sid,acts,notas,notaAsistPct,asistPuntos){
  var ap=Number(asistPuntos)||ASIST_PUNTOS_DEFAULT;
  var totalPesos=acts.reduce(function(a,x){return a+pesoParsed(x.peso);},0)+ap;
  if(!totalPesos)return 0;
  var suma=acts.reduce(function(a,x){return a+(notas[sid]?notas[sid][x.id]||0:0);},0);
  suma+=(notaAsistPct/100)*ap;
  return Math.round(suma/totalPesos*100);
};

var calcNotaAcadV2=function(sid,acts,notas){
  var totalPesos=acts.reduce(function(a,x){return a+pesoParsed(x.peso);},0);
  if(!totalPesos)return 0;
  return Math.round(acts.reduce(function(a,x){return a+(notas[sid]?notas[sid][x.id]||0:0);},0)/totalPesos*100);
};

    students:[],dias:[],
    acts:[

    documentos:DOC_TIPOS.map(function(t){return{id:mkId(),tipo:t,nombre:"",descripcion:"",fechaInicio:"",fechaFin:"",urlPlan:""};})
  };

var migrateArea=function(m,maestroNombre){
  return Object.assign({filiacion:{},tareas:[],documentos:DOC_TIPOS.map(function(t){return{id:mkId(),tipo:t,nombre:"",descripcion:"",fechaInicio:"",fechaFin:"",urlPlan:""};})},m,{asistPuntos:m.asistPuntos||String(ASIST_PUNTOS_DEFAULT),dias:m.dias||[],acts:m.acts||[],asistencia:m.asistencia||{},notas:m.notas||{},curso:Object.assign({director:"",centroEducativo:"Centro Educativo",etapaCarrera:"",maestro:maestroNombre||"",cargoMaestro:CARGO_MAESTRO[0],cargoDirector:CARGO_DIRECTOR[0]},m.curso||{})});
};

var leerArchivoExcel=function(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var rows=[];
        if(file.name.endsWith(".csv")){var lines=ev.target.result.trim().split(/\r?\n/);var headers=lines[0].split(/[,;|\t]/);rows=lines.slice(1).map(function(l){var vals=l.split(/[,;|\t]/);var obj={};headers.forEach(function(hh,i){obj[hh.trim()]=vals[i]?vals[i].trim():"";});return obj;});}
        else{var wb=XLSX.read(ev.target.result,{type:"binary"});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});}
        resolve(rows);
      }catch(err){reject(err);}
    };
    reader.onerror=function(){reject(new Error("No se pudo leer el archivo."));};
    if(file.name.endsWith(".csv"))reader.readAsText(file);else reader.readAsBinaryString(file);
  });
};

var parseEstudiantes=function(rows){
  var norm=function(s){return String(s||"").trim();};
  var keys0=Object.keys(rows[0]||{});
  var colN=keys0.find(function(k){return/nombre|name|alumno|estudiante/i.test(k);})||keys0[0];
  var colCI=keys0.find(function(k){return/ci|c\.i|cedula|id|documento/i.test(k);})||keys0[1];
  return rows.filter(function(r){return norm(r[colN]);}).map(function(r){return{id:mkId(),nombre:norm(r[colN]),ci:norm(r[colCI]||"")};});
};

var estilosPDF="body{font-family:Arial,Helvetica,sans-serif;font-size:10px;margin:12px;color:#1a1a1a}table{border-collapse:collapse}th{background:#1a3a6a;color:#fff;padding:4px 3px;font-size:8px;text-align:center}td{padding:3px 4px;border-bottom:0.5px solid #eee}@media print{body{margin:8px}@page{size:landscape;margin:8mm}}";
var escalaHTML="<div style='background:#f7f8fa;border-radius:6px;padding:5px 10px;margin-bottom:10px;border:0.5px solid #ddd;font-size:8.5px;color:#555;display:flex;gap:10px;flex-wrap:wrap'><b>Escala:</b><span style='color:#1a6e2e;font-weight:600'>91-100: Excelente</span><span style='color:#2d7a3a;font-weight:600'>81-90: Muy Bueno</span><span style='color:#b07d00;font-weight:600'>71-80: Bueno</span><span style='color:#b05a00;font-weight:600'>61-70: Suficiente</span><span style='color:#c0392b;font-weight:600'>0-60: Requiere apoyo</span></div>";

var cabeceraHTML=function(curso,titulo){
  return"<div style='display:flex;align-items:center;background:#1a3a6a;color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px'><div style='font-size:22px;margin-right:14px'>📚</div><div><div style='font-size:9px;letter-spacing:1.5px;opacity:.7;margin-bottom:2px'>REGISTRO PEDAGÓGICO DIGITAL</div><div style='font-size:15px;font-weight:700'>"+(curso.centroEducativo||"")+"</div><div style='font-size:11px;opacity:.85;margin-top:2px'>"+(curso.etapaCarrera||"")+" - "+(curso.nivel||"")+" - Gestión "+(curso.gestion||"")+"</div><div style='font-size:11px;opacity:.7;margin-top:1px;font-weight:600'>"+(curso.modulo||"")+" - "+titulo+"</div></div></div>";

var exportarPDFAsistencia=function(curso,students,dias,asistencia){
  var studentsActivos=students.filter(function(s){return!esEstudianteRetirado(s.id,dias,asistencia);});
  var colDia=28,colNom=150,colCI=55,colPct=46,colNiv=72;
  var totalW=36+colNom+colCI+(dias.length*colDia)+colPct+colNiv;
  var diasHeader=dias.map(function(d){var base=d.replace(/\(\d+\)$/,"");var parts=base.split("/");var label=parts.length>=2?(parts[0]+"/"+parts[1]):base;return"<th style='width:"+colDia+"px;font-size:7.5px;text-align:center;padding:3px 1px;white-space:nowrap'>"+label+"</th>";}).join("");
  var rows=studentsActivos.map(function(s,i){var pct=calcNotaAsist(s.id,dias,asistencia);var celdas=dias.map(function(d){var ic=(asistencia[s.id]?asistencia[s.id][d]||"🟢":"🟢");var val=ICON_VALORES[ic];var bg=val===100?"#eaf3de":val>=90?"#faeeda":val>=40?"#fff3cd":"#fcebeb";return"<td style='text-align:center;background:"+bg+";font-size:12px;padding:2px 1px;width:"+colDia+"px'>"+ic+"</td>";}).join("");return"<tr style='background:"+(i%2===0?"#fff":"#f9fbff")+"'><td style='text-align:center;color:#aaa;font-size:9px;width:28px'>"+(i+1)+"</td><td style='font-weight:500;width:"+colNom+"px;font-size:10px'>"+s.nombre+"</td><td style='text-align:center;color:#888;width:"+colCI+"px;font-size:9px'>"+(s.ci||"")+"</td>"+celdas+"<td style='text-align:center;font-weight:700;color:"+gc_pdf(pct)+";width:"+colPct+"px;font-size:10px'>"+pct+"%</td><td style='text-align:center;color:"+gc_pdf(pct)+";font-size:8px;width:"+colNiv+"px'>"+gl_pdf(pct)+"</td></tr>";}).join("");
  var win=window.open("","_blank");
  win.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Asistencia</title><style>table{width:"+totalW+"px}"+estilosPDF+"</style></head><body>"+cabeceraHTML(curso,"REGISTRO DE ASISTENCIA")+escalaHTML+"<table><thead><tr><th style='width:28px'>N</th><th style='text-align:left;width:"+colNom+"px'>Estudiante</th><th style='width:"+colCI+"px'>C.I.</th>"+diasHeader+"<th style='width:"+colPct+"px'>% Asist.</th><th style='width:"+colNiv+"px'>Nivel</th></tr></thead><tbody>"+rows+"</tbody></table>"+pieFirmaHTML(curso)+scriptAutoPrint+"</body></html>");
  win.document.close();
};

var exportarPDFEvaluacion=function(curso,students,acts,notas,asistencia,dias,asistPuntos){
  var studentsActivos=students.filter(function(s){return!esEstudianteRetirado(s.id,dias,asistencia);});
  var asistP=Number(asistPuntos)||ASIST_PUNTOS_DEFAULT;
  var colNom=150,colCI=52,colNum=28,colAct=Math.max(52,Math.min(80,Math.floor(360/Math.max(acts.length,1)))),colAsist=58,colFin=50,colNiv=70;
  var totalW=colNum+colNom+colCI+(acts.length*colAct)+colAsist+colFin+colNiv;
  var actsHeader=acts.map(function(a){return"<th style='width:"+colAct+"px;font-size:8px;text-align:center;padding:3px 2px'>"+a.nombre+"<br/><span style='font-weight:400;opacity:.85'>max "+pesoParsed(a.peso)+" pts</span></th>";}).join("");
  var rows=studentsActivos.map(function(s,i){var notaAsistPct=calcNotaAsist(s.id,dias,asistencia),ptsAsist=Math.round(notaAsistPct/100*asistP),nFin=calcNotaFinalV2(s.id,acts,notas,notaAsistPct,asistP);var celdas=acts.map(function(a){var pesoAct=pesoParsed(a.peso),val=notas[s.id]?notas[s.id][a.id]||0:0,pct=pesoAct>0?Math.round(val/pesoAct*100):0,bg=pct>=91?"#d4f0dc":pct>=81?"#eaf3de":pct>=71?"#faeeda":pct>=61?"#fde8d0":"#fcebeb";return"<td style='text-align:center;background:"+bg+";color:"+gc_pdf(pct)+";font-weight:600;width:"+colAct+"px;font-size:10px'>"+val+"/"+pesoAct+"</td>";}).join("");return"<tr style='background:"+(i%2===0?"#fff":"#f9fbff")+"'><td style='text-align:center;color:#aaa;width:"+colNum+"px;font-size:9px'>"+(i+1)+"</td><td style='font-weight:500;width:"+colNom+"px;font-size:10px'>"+s.nombre+"</td><td style='text-align:center;color:#888;width:"+colCI+"px;font-size:9px'>"+(s.ci||"")+"</td>"+celdas+"<td style='text-align:center;color:"+gc_pdf(notaAsistPct)+";font-weight:600;width:"+colAsist+"px;font-size:10px'>"+ptsAsist+"/"+asistP+"<br/><span style='font-size:8px;font-weight:400'>"+notaAsistPct+"%</span></td><td style='text-align:center;font-weight:700;font-size:13px;color:"+gc_pdf(nFin)+";width:"+colFin+"px'>"+nFin+"%</td><td style='text-align:center;color:"+gc_pdf(nFin)+";font-size:8.5px;width:"+colNiv+"px'>"+gl_pdf(nFin)+"</td></tr>";}).join("");
  var win=window.open("","_blank");
  win.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Evaluacion</title><style>table{width:"+totalW+"px}"+estilosPDF+"</style></head><body>"+cabeceraHTML(curso,"REGISTRO DE EVALUACIÓN")+escalaHTML+"<table><thead><tr><th style='width:"+colNum+"px'>N</th><th style='text-align:left;width:"+colNom+"px'>Estudiante</th><th style='width:"+colCI+"px'>C.I.</th>"+actsHeader+"<th style='width:"+colAsist+"px;font-size:8px'>Asistencia<br/><span style='font-weight:400;opacity:.85'>max "+asistP+" pts</span></th><th style='width:"+colFin+"px'>Nota Final</th><th style='width:"+colNiv+"px;font-size:8px'>Nivel</th></tr></thead><tbody>"+rows+"</tbody></table>"+pieFirmaHTML(curso)+scriptAutoPrint+"</body></html>");
  win.document.close();
};
